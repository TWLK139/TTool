<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>剪贴板转表格工具</title>
    <link rel="stylesheet" href="../../shared/styles.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- 导航（由 shared/nav.js 自动渲染） -->
        <div id="nav"></div>

        <h1>剪贴板转表格</h1>
        <p class="subtitle">粘贴 Excel / 表格 / TSV / CSV 内容，一键转成 Markdown、HTML、CSV、Excel</p>

        <!-- 左右分栏：左=输入，右=结果预览；中间收起控制 -->
        <div class="split" id="splitLayout">

        <!-- 左：输入区 -->
        <div class="pane pane-input">
        <div class="card">
            <div class="card-title"><span class="icon">📋</span> 输入内容</div>
            <label for="inputText">粘贴表格内容（支持从 Excel / 网页表格 / 飞书 复制）：</label>
            <textarea id="inputText" placeholder="示例（用 Tab 或逗号分隔，每行一条）：&#10;字段&#9;类型&#9;描述&#10;title&#9;String&#9;条件名称&#10;type&#9;String&#9;条件类型"></textarea>
            <div id="errorMsg" class="error-msg"></div>

            <div class="options-row">
                <div class="option-item">
                    <label for="optDelim" style="margin:0">分隔符：</label>
                    <select id="optDelim">
                        <option value="auto">自动识别</option>
                        <option value="tab">Tab 制表符</option>
                        <option value="comma">逗号 ,</option>
                        <option value="semicolon">分号 ;</option>
                        <option value="pipe">竖线 |（Markdown）</option>
                        <option value="newline">换行分列（每格一行）</option>
                    </select>
                </div>
                <div class="option-item">
                    <label for="optCols" style="margin:0" title="仅在「换行分列」时生效：把连续的单元格按此列数重排。留空则自动猜测">列数：</label>
                    <input type="number" id="optCols" min="1" step="1" placeholder="自动" style="width:64px">
                </div>
                <div class="option-item">
                    <input type="checkbox" id="optHeader" checked>
                    <label for="optHeader" style="margin:0">首行作为表头</label>
                </div>
                <div class="option-item">
                    <input type="checkbox" id="optMerge">
                    <label for="optMerge" style="margin:0" title="少列的行并入上一行最后一列（用于描述跨行的场景）">合并续行</label>
                </div>
            </div>

            <div id="parseNote" class="parse-note" style="display:none;"></div>

            <div class="btn-row">
                <button class="btn-paste" onclick="pasteFromClipboard()">从剪贴板粘贴</button>
                <button class="btn-convert" onclick="convertTable()">转换 → 表格</button>
                <button class="btn-clear" onclick="clearAll()">清空</button>
            </div>
        </div>
        </div>

        <!-- 中：收起控制（可收起左右任意一侧，让另一侧占满宽度） -->
        <div class="divider">
            <button class="divider-btn" id="toggleInputBtn" onclick="togglePane('input')" title="收起输入区">‹</button>
            <button class="divider-btn" id="togglePreviewBtn" onclick="togglePane('preview')" title="收起预览区">›</button>
        </div>

        <!-- 右：解析预览（仅那一个表格） -->
        <div class="pane pane-preview">
        <!-- 尚未转换时的占位 -->
        <div class="card preview-empty" id="previewEmpty">转换后，解析预览显示在这里</div>

        <div class="card" id="previewCard" style="display:none;">
            <div class="card-title">
                <span class="icon">🔍</span> 解析预览
                <span id="dimInfo" class="dim-info"></span>
            </div>
            <label>请先核对，行列是否正确：</label>
            <div class="preview-wrap">
                <table id="previewTable" class="preview-table"></table>
            </div>
        </div>
        </div>

        </div>
        <!-- /split -->

        <!-- 转换结果（通栏）：Markdown / HTML / CSV / Excel 及其输出与复制、下载 -->
        <div class="card" id="resultCard" style="display:none;">
            <div class="card-title"><span class="icon">✅</span> 转换结果</div>

            <!-- 格式切换 -->
            <div class="format-tabs">
                <button class="format-tab active" data-fmt="md" onclick="switchFormat('md')">Markdown</button>
                <button class="format-tab" data-fmt="html" onclick="switchFormat('html')">HTML</button>
                <button class="format-tab" data-fmt="csv" onclick="switchFormat('csv')">CSV</button>
                <button class="format-tab" data-fmt="excel" onclick="switchFormat('excel')">Excel</button>
            </div>

            <div id="excelHint" class="excel-hint" style="display:none;">
                Excel 为下载文件（.xls，可被 Excel / WPS / Numbers 直接打开）。下方文本为其内部 HTML 表格源码，仅供查看。
            </div>

            <div class="result-area">
                <textarea id="outputText" readonly style="min-height:200px; background:#fafbff;"></textarea>
                <div class="result-btns">
                    <button class="btn-copy copy-btn" onclick="copyCurrent()">复制文本</button>
                    <button class="btn-copy copy-rich-btn" onclick="copyRichTable()" title="粘贴到 Word / 飞书文档 会得到真正的表格">复制为富文本表格</button>
                    <button class="btn-copy download-btn" id="downloadBtn" style="display:none;" onclick="downloadCurrent()">下载文件</button>
                </div>
            </div>
        </div>


    </div>

    <div id="toast" class="toast"></div>

    <!-- 公共脚本 -->
    <script src="../../shared/pages.js"></script>
    <script src="../../shared/nav.js"></script>
    <script src="../../shared/ui.js"></script>
    <!-- 本页脚本 -->
    <script src="script.js"></script>
</body>
</html>
